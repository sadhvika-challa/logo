<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="styles.css" />
    <title>Logo Lift</title>
  </head>
  <body>
    <header class="ll-header">
      <span class="ll-logo" aria-hidden="true">
        <svg viewBox="0 0 24 24" width="20" height="20">
          <path d="M12 4 L18 12 H14 V20 H10 V12 H6 Z" fill="#4F46E5" />
        </svg>
      </span>
      <h1 class="ll-title">Logo Lift</h1>
    </header>

    <main id="ll-content" class="ll-content">
      <div id="ll-status" class="ll-status">Scanning page for logos…</div>
      <div id="ll-results" class="ll-results"></div>
      <section id="ll-brand" class="ll-brand" hidden>
        <h2 class="ll-section-title">Brand Guidelines</h2>
        <ul id="ll-brand-list" class="ll-brand-list"></ul>
      </section>
    </main>

    <footer class="ll-footer">Built by Sadhvika Challa</footer>

    <!-- Bundled raster-to-SVG tracer (public domain, Unlicense). -->
    <script src="lib/imagetracer.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
